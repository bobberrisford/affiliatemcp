name = "affiliate-mcp-issuer"
main = "src/index.ts"
compatibility_date = "2026-03-25"
# nodejs_compat gives us the Node-style globals some Stripe paths expect; the
# signing path uses WebCrypto Ed25519 (built in) and does not require it, but
# the Stripe fetch client is happiest with it enabled.
compatibility_flags = ["nodejs_compat"]

# ── KV: purchase records ──────────────────────────────────────────────────
# Stores:
#   email:<lower-cased-email>   -> JSON { lid, token, issued }
#   lid:<lid>                   -> <email>
#   evt:<stripe_event_id>       -> "1"   (idempotency marker, TTL'd)
# Create with:  npx wrangler kv namespace create LICENCES
#               npx wrangler kv namespace create LICENCES --preview
# then paste the returned ids below.
[[kv_namespaces]]
binding = "LICENCES"
id = "23c1179a84c14acab2c5491ad3663914"
preview_id = "66a17a43c6284e02b202a8c3b9432c21"

# ── Non-secret vars (override per-env or in the dashboard) ─────────────────
# Public-ish config. Secrets (below) are NOT set here.
[vars]
# Base URLs for the Checkout redirect. SUCCESS_URL gets
# ?session_id={CHECKOUT_SESSION_ID} appended by the Worker.
SUCCESS_URL = "https://affiliate-mcp-issuer.robertberrisford.workers.dev/success"
CANCEL_URL = "https://affiliate-mcp-issuer.robertberrisford.workers.dev/cancel"
# From address for the licence email (must be a verified Resend sender).
LICENCE_FROM_EMAIL = "licences@example.com"
# Optional: a pre-created Stripe Price id. If unset, inline price_data (£39) is used.
# STRIPE_PRICE_ID = "price_xxx"
# Optional: comma-separated extra CORS origins to allow (the desktop app's
# file:// / app:// origin is allowed by default).
# EXTRA_CORS_ORIGINS = "app://obsidian.md"

# ── Secrets — set via `wrangler secret put <NAME>` (NEVER commit) ──────────
#   STRIPE_SECRET_KEY      sk_live_… / sk_test_…
#   STRIPE_WEBHOOK_SECRET  whsec_…   (from the registered webhook endpoint)
#   LICENCE_SIGNING_KEY    Ed25519 PKCS8 DER, base64 (the PRIVATE key)
#   RESEND_API_KEY         re_…      (omit in local dev → emails are logged)
