name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      # OIDC trusted publishing requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - run: npm install -g npm@latest
      - run: npm ci
      - name: Decide whether this version needs publishing
        id: check
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "affiliate-networks-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "$VERSION is already on npm; nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$VERSION is not on npm; will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.publish == 'true'
        run: npm run typecheck
      - if: steps.check.outputs.publish == 'true'
        run: npm run lint
      - if: steps.check.outputs.publish == 'true'
        run: npm test
      - if: steps.check.outputs.publish == 'true'
        run: npm run build
      - if: steps.check.outputs.publish == 'true'
        run: npm publish
