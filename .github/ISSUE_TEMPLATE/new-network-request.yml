name: New network request
description: Request a new affiliate network adapter
title: "[network-request] <network name>"
labels: ["new-network", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this to request a new network adapter. Search existing issues first —
        your network may already be on the queue. We only add networks that
        publish a real REST or GraphQL API; browser-automation adapters are out
        of scope.
  - type: input
    id: network-name
    attributes:
      label: Network name
      description: The public network or platform name.
      placeholder: e.g. Skimlinks
    validations:
      required: true
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Short lowercase identifier to use throughout the codebase.
      placeholder: e.g. skimlinks
    validations:
      required: true
  - type: dropdown
    id: side
    attributes:
      label: Which side matters first
      options:
        - publisher
        - advertiser
        - both
    validations:
      required: true
  - type: input
    id: dashboard-url
    attributes:
      label: Dashboard URL
      description: Where users log in for the side requested above.
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: api-docs
    attributes:
      label: API documentation URL
      description: Link to the public API reference.
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: auth-model
    attributes:
      label: Auth model
      options:
        - bearer token
        - OAuth 2
        - basic auth
        - custom or unsure
    validations:
      required: true
  - type: textarea
    id: account-requirements
    attributes:
      label: Account requirements
      description: What does a user need to do to get API access? Approval, tier, minimum revenue, region, or contract requirement?
    validations:
      required: true
  - type: textarea
    id: workflows
    attributes:
      label: Which workflows matter most
      description: "Examples: performance briefs, partner discovery, unpaid commission checks, link audits, QBR prep, anomaly reviews, outreach drafting."
    validations:
      required: true
  - type: textarea
    id: why-useful
    attributes:
      label: Who this helps
      description: Tell us whether this mainly helps publishers, advertisers, agencies, developers, or network teams.
    validations:
      required: true
