name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write # create the GitHub release + tag
  id-token: write # required for npm OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      # OIDC trusted publishing requires npm >= 11.5.1; Node 20 ships npm 10.x.
      # Pinned to major 11: npm 12 requires Node >= 22, so `npm@latest` broke
      # every publish run on this Node 20 workflow when npm 12 shipped.
      - run: npm install -g npm@11
      - run: npm ci
      - name: Decide whether this version needs publishing
        id: check
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "affiliate-networks-mcp@$VERSION" version >/dev/null 2>&1; then
            echo "$VERSION is already on npm; nothing to publish."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$VERSION is not on npm; will publish."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.check.outputs.publish == 'true'
        run: npm run typecheck
      - if: steps.check.outputs.publish == 'true'
        run: npm run lint
      - if: steps.check.outputs.publish == 'true'
        run: npm test
      - if: steps.check.outputs.publish == 'true'
        run: npm run build
      - if: steps.check.outputs.publish == 'true'
        run: npm run build:mcpb
      - if: steps.check.outputs.publish == 'true'
        run: npm publish
      - name: Ensure a GitHub release exists for this version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          TAG="v$VERSION"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "release $TAG already exists; nothing to do."
          else
            gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --generate-notes
          fi
      - name: Attach the Claude Desktop MCP Bundle
        if: steps.check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          # Versioned asset: archival, and lets anyone pin a specific release.
          gh release upload "v$VERSION" ".artifacts/affiliate-networks-mcp-$VERSION.mcpb" --clobber
          # Stable-named copy: the marketing site links to
          # releases/latest/download/affiliate-networks-mcp.mcpb, which always
          # resolves to the newest release, so the download link never goes stale.
          cp ".artifacts/affiliate-networks-mcp-$VERSION.mcpb" ".artifacts/affiliate-networks-mcp.mcpb"
          gh release upload "v$VERSION" ".artifacts/affiliate-networks-mcp.mcpb" --clobber
