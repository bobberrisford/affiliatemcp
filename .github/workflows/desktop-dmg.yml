name: Desktop DMG

# Builds the Electron desktop app into a downloadable macOS .dmg on a GitHub
# macOS runner, so a maintainer can install and test it without a local Mac
# toolchain. The artifact is UNSIGNED and NOT notarised (no Apple credentials in
# CI), so on first launch macOS Gatekeeper will block it: right-click the app
# and choose Open, or run `xattr -dr com.apple.quarantine <app>`.
#
# Interface: trigger manually from the Actions tab (workflow_dispatch) and pick
# the branch/tag to build via the `ref` input. The push trigger below bootstraps
# the first build from this branch and can be dropped once the workflow is on
# main and dispatch is used.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag or SHA to build the desktop app from
        required: false
        default: claude/hosted-version-nontechnical-fg8owb
  push:
    branches: [chore/desktop-dmg-workflow]

permissions:
  contents: read

jobs:
  dmg:
    runs-on: macos-14
    steps:
      - name: Resolve ref to build
        id: pick
        run: echo "ref=${{ github.event.inputs.ref || 'claude/hosted-version-nontechnical-fg8owb' }}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.pick.outputs.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps and build core
        run: |
          npm ci
          npm run build

      - name: Install desktop deps and bundle core/server
        working-directory: desktop
        run: |
          npm ci
          npm run bundle

      - name: Build unsigned, universal macOS dmg
        working-directory: desktop
        env:
          # No signing identity or notarisation creds in CI: build unsigned so
          # electron-builder does not try (and fail) to sign or notarise.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac dmg --universal --publish never -c.mac.notarize=false

      - name: Upload the dmg
        uses: actions/upload-artifact@v4
        with:
          name: affiliate-mcp-cockpit-dmg
          path: desktop/dist/*.dmg
          if-no-files-found: error
