name: Desktop Release

# Builds, signs, notarises, and PUBLISHES a desktop release to GitHub Releases
# under the `desktop-v<version>` tag — INCLUDING the electron-updater feed
# (`-mac.zip` + `latest-mac.yml`) so in-app auto-update actually works. This is
# the release path; `desktop-dmg.yml` remains the artifact-only test build.
#
# See docs/decisions/2026-07-01-desktop-signed-release-pipeline.md.
#
# Trigger: run manually from the Actions tab (workflow_dispatch) with a `version`
# input, e.g. 0.1.3. The job bumps desktop/package.json on main, then builds the
# signed universal dmg + zip, staples the dmg, and publishes the feed to a
# non-draft `desktop-v<version>` release. Version is FORWARD-ONLY: it must exceed
# the latest published desktop-v* release (electron-updater never downgrades).

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Desktop version to release, e.g. 0.1.3 (must exceed the latest desktop-v* release)'
        required: true
        type: string

permissions:
  contents: write # push the version bump commit + create the tag/release

concurrency:
  group: desktop-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    env:
      NEW: ${{ github.event.inputs.version }}
    steps:
      - name: Validate version input
        run: |
          if ! printf '%s' "$NEW" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version must be semver x.y.z (got '$NEW')"
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          # The default GITHUB_TOKEN is persisted so we can push the bump to main.

      - name: Require signing credentials
        # A published release must be signed + notarised. Fail loudly rather than
        # silently shipping an unsigned build users would be blocked from opening.
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$CSC_LINK" ]; then
            echo "::error::signing secrets missing (APPLE_ID / CSC_LINK). A release must be signed + notarised."
            exit 1
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Require the version to move forward
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest=$(gh release list --limit 200 --json tagName -q '.[].tagName' \
            | grep '^desktop-v' | sed 's/desktop-v//' | sort -V | tail -1 || true)
          echo "latest published: ${latest:-none}; requested: $NEW"
          if [ -n "$latest" ]; then
            if [ "$latest" = "$NEW" ] || [ "$(printf '%s\n%s\n' "$latest" "$NEW" | sort -V | tail -1)" != "$NEW" ]; then
              echo "::error::version $NEW does not exceed the latest published desktop-v$latest"
              exit 1
            fi
          fi

      - name: Bump desktop version + commit to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          ( cd desktop && npm version "$NEW" --no-git-tag-version )
          git add desktop/package.json desktop/package-lock.json
          git commit -m "chore(desktop): release v$NEW"
          git push origin main

      - name: Install root deps + build core
        run: |
          npm ci
          npm run build

      - name: Install desktop deps + bundle core/server
        working-directory: desktop
        run: |
          npm ci
          npm run bundle

      - name: Build, sign + notarise (universal dmg + zip)
        # --publish never: we build here and publish deliberately below, so the
        # dmg can be stapled before it is uploaded. electron-builder still writes
        # latest-mac.yml + the -mac.zip feed (publish config is present), and
        # notarises + staples the .app (mac.notarize: true reads APPLE_*).
        working-directory: desktop
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --universal --publish never

      - name: Verify the auto-update feed was produced
        working-directory: desktop
        run: |
          echo "dist contents:"; ls -1 dist
          test -f dist/latest-mac.yml || { echo "::error::latest-mac.yml missing — the update feed would be incomplete"; exit 1; }
          ls dist/*-mac.zip >/dev/null 2>&1 || { echo "::error::-mac.zip missing — electron-updater needs the zip"; exit 1; }
          ls dist/*.dmg     >/dev/null 2>&1 || { echo "::error::.dmg missing"; exit 1; }

      - name: Staple the dmg container
        # electron-builder staples the .app, not the .dmg (see DEPLOY.md §3), so
        # staple the disk image itself for offline first-mount of manual downloads.
        working-directory: desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in dist/*.dmg; do
            xcrun notarytool submit "$dmg" --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      - name: Publish the desktop-v release + feed
        # gh release create makes a NON-DRAFT release (electron-updater ignores
        # drafts/prereleases), tags it on the bump commit, and uploads the dmg +
        # zip + latest-mac.yml (+ blockmaps) as the update feed.
        working-directory: desktop
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "desktop-v$NEW" \
            --target main \
            --title "Agentic Affiliate Desktop v$NEW" \
            --notes "Signed, notarised desktop build. In-app auto-update: existing installs will offer \"relaunch to update\" on next launch." \
            dist/*.dmg dist/*-mac.zip dist/latest-mac.yml dist/*.blockmap

      - name: Summary
        run: |
          {
            echo "### Published desktop-v$NEW"
            echo "- signed + notarised universal .dmg (stapled)"
            echo "- -mac.zip + latest-mac.yml (electron-updater feed)"
            echo "- existing users get \"relaunch to update\" on next launch"
          } >> "$GITHUB_STEP_SUMMARY"
