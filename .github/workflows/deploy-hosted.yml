name: Deploy hosted Worker

# Manual, gated deploy of the hosted connect/auth/billing/digest Worker
# (affiliate-mcp-hosted, https://hosted.agenticaffiliate.ai) to Cloudflare.
#
# Deliberately NOT triggered on push. The hosted Worker is the production
# billing and entitlement surface, so a deploy is a human-triggered action,
# not a side effect of merging to main. See
# docs/decisions/2026-07-16-hosted-worker-ci-deploy.md.
#
# Prerequisites (one-time, see the decision record):
#   - repo secrets CLOUDFLARE_API_TOKEN (Edit Workers, scoped to the account)
#     and CLOUDFLARE_ACCOUNT_ID
#   - hosted/wrangler.toml filled with the real (non-secret) KV ids and [vars]
#     — no REPLACE_WITH_* placeholders
#   - the Worker's actual secrets (VAULT_MASTER_KEY, SESSION_SIGNING_KEY,
#     RESEND_API_KEY, STRIPE_*) already set via `wrangler secret put`; they
#     persist on the Worker and are NOT touched by a code deploy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm a production deploy of the hosted Worker'
        required: true
        default: ''

permissions:
  contents: read

concurrency:
  group: deploy-hosted
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require explicit confirmation
        if: ${{ inputs.confirm != 'deploy' }}
        run: |
          echo "::error::Set the 'confirm' input to 'deploy' to proceed with a production deploy."
          exit 1

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: hosted/package-lock.json

      - run: npm ci --prefix hosted

      # Gate on the Worker's own tests before shipping to the billing surface.
      - run: npm --prefix hosted test

      - name: Guard against deploying the template wrangler.toml
        run: |
          if grep -q 'REPLACE_WITH' hosted/wrangler.toml; then
            echo "::error::hosted/wrangler.toml still contains REPLACE_WITH_* placeholders. Fill in the real KV ids and [vars] before deploying."
            exit 1
          fi

      # `wrangler deploy` uploads code + [vars] + bindings. Secrets set via
      # `wrangler secret put` persist on the Worker and are not affected.
      - name: Deploy hosted Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm --prefix hosted run deploy
